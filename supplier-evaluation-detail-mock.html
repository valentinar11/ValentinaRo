<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier submission & evaluation (mock)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@6.0.1/primeicons.css">
    <style>
        :root {
            --primary-500: #0092D1;
            --primary-600: #0284c7;
            --primary-50: #e6f7ff;
            --primary-100: #bae7ff;
            --surface-0: #ffffff;
            --surface-50: #f5f8fb;
            --surface-100: #ebf1f8;
            --surface-200: #dde8f2;
            --surface-600: #95a7ba;
            --success-600: #3d8a2e;
            --success-50: #d2e7cd;
            --warning-600: #c2410c;
            --warning-50: #f9d6c3;
            --danger-600: #b91c1c;
            --text-primary: #111827;
            --text-muted: #6b7280;
            --radius-md: 8px;
            --radius-lg: 12px;
            --spacing-sm: 12px;
            --spacing-md: 20px;
            --spacing-lg: 28px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans', system-ui, sans-serif;
            background: var(--surface-50);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }
        .page-header {
            background: var(--surface-0);
            border-bottom: 1px solid var(--surface-200);
            padding: var(--spacing-md) var(--spacing-lg);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .page-header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-600);
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .back-link:focus { outline: 2px solid var(--primary-500); outline-offset: 2px; border-radius: 4px; }
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }
        .supplier-banner {
            background: var(--surface-0);
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .supplier-banner h1 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .supplier-banner h1 .pi { color: var(--primary-500); }
        .supplier-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-top: var(--spacing-sm);
            font-size: 13px;
            color: var(--text-muted);
        }
        .supplier-meta span { display: inline-flex; align-items: center; gap: 6px; }
        .main-tabs {
            display: flex;
            gap: 4px;
            border-bottom: 2px solid var(--surface-200);
            margin-bottom: var(--spacing-md);
        }
        .main-tab {
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .main-tab:hover { color: var(--primary-600); background: var(--surface-100); }
        .main-tab[aria-selected="true"] {
            color: var(--primary-600);
            background: var(--surface-0);
            box-shadow: inset 0 -2px 0 var(--primary-500);
        }
        .main-tab:focus { outline: 2px solid var(--primary-500); outline-offset: 2px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .sub-tabs-wrap {
            background: var(--surface-0);
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .sub-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 8px;
            background: var(--surface-50);
            border-bottom: 1px solid var(--surface-200);
        }
        .sub-tab {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .sub-tab .pi { font-size: 14px; color: var(--surface-600); }
        .sub-tab:hover { background: var(--surface-100); color: var(--text-primary); }
        .sub-tab[aria-selected="true"] {
            background: var(--surface-0);
            border-color: var(--surface-200);
            color: var(--primary-600);
            box-shadow: 0 1px 2px rgba(0,0,0,.05);
        }
        .sub-tab[aria-selected="true"] .pi { color: var(--primary-500); }
        .sub-tab:focus { outline: 2px solid var(--primary-500); outline-offset: 1px; }
        .sub-panel {
            display: none;
            padding: var(--spacing-md);
        }
        .sub-panel.active { display: block; }
        .mock-block {
            font-size: 13px;
            color: var(--text-primary);
        }
        .mock-block h3 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .mock-dl { display: grid; gap: 10px; }
        .mock-dl div {
            padding: 10px 12px;
            background: var(--surface-50);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--primary-500);
        }
        .mock-dl dt { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
        .mock-dl dd { font-size: 13px; color: var(--text-muted); }
        .eval-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: var(--surface-0);
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .eval-table th, .eval-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--surface-200);
        }
        .eval-table th {
            background: var(--surface-50);
            font-weight: 600;
            font-size: 12px;
        }
        .eval-table tr:last-child td { border-bottom: none; }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 999px;
        }
        .status-pill.pass { background: var(--success-50); color: var(--success-600); }
        .status-pill.in_progress { background: var(--primary-50); color: var(--primary-600); }
        .status-pill.clarification { background: var(--warning-50); color: var(--warning-600); }
        .status-pill.not_started { background: var(--surface-100); color: var(--text-muted); }
        .note {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: var(--spacing-md);
            padding: var(--spacing-sm);
            background: var(--primary-50);
            border-radius: var(--radius-md);
        }
        .bidding-history-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -2px;
            padding: 0 2px;
        }
        .bidding-history-table {
            min-width: 1180px;
        }
        .bidding-history-table th {
            white-space: nowrap;
        }
        .ref-badge {
            display: inline-block;
            background: #4b5563;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .bidding-history-table .num-cell {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .clar-card {
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            background: var(--surface-0);
        }
        .clar-card-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }
        .clar-card-header strong { font-size: 14px; }
        .clar-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .clar-snippet {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.45;
        }
        .eval-summary { margin-bottom: var(--spacing-md); }
        .eval-section-lead {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            margin: 0 0 12px;
            line-height: 1.5;
        }
        h2.eval-section-lead {
            font-family: inherit;
        }
        .eval-stage-section {
            margin-top: var(--spacing-lg);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--surface-200);
        }
        .eval-stage-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: var(--spacing-md);
        }
        .eval-stage-tab {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-md);
            background: var(--surface-0);
            color: var(--text-muted);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .eval-stage-tab:hover { background: var(--surface-50); color: var(--text-primary); }
        .eval-stage-tab[aria-selected="true"] {
            border-color: var(--primary-500);
            color: var(--primary-600);
            background: var(--primary-50);
        }
        .eval-stage-tab:focus { outline: 2px solid var(--primary-500); outline-offset: 2px; }
        .eval-stage-panel { display: none; }
        .eval-stage-panel.active { display: block; }
        .eval-criteria-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px 12px;
            background: var(--surface-50);
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-md);
        }
        .eval-criteria-header .supplier-line {
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .eval-criteria-header .final-line {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        .eval-criteria-header .final-line strong { color: var(--text-primary); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
        .eval-criteria-table { font-size: 12px; }
        .eval-criteria-table th { white-space: nowrap; }
        .eval-criteria-table td { vertical-align: top; }
        .criteria-id { color: var(--primary-600); font-weight: 600; font-size: 13px; }
        .criteria-title { font-weight: 700; font-size: 13px; color: var(--text-primary); }
        .criteria-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.45; }
        .criteria-tags { margin-top: 8px; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
        .tag-pill {
            font-size: 11px;
            font-weight: 500;
            padding: 2px 8px;
            background: var(--surface-100);
            color: var(--text-muted);
            border-radius: 4px;
        }
        .tag-sp {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            background: var(--warning-50);
            color: var(--warning-600);
            border-radius: 4px;
        }
        .form-stack { display: flex; flex-direction: column; gap: 6px; }
        .form-line {
            display: inline-flex;
            align-items: flex-start;
            gap: 6px;
            color: var(--text-primary);
        }
        .form-line .pi { color: var(--primary-500); margin-top: 2px; font-size: 14px; }
        .form-meta { font-size: 11px; color: var(--text-muted); }
        .eval-note { font-size: 12px; color: var(--text-primary); line-height: 1.45; }
        .eval-note.empty { color: var(--text-muted); }
        .status-pill.fail { background: #fee2e2; color: var(--danger-600); }
        .status-pill.fail .pi { color: var(--danger-600); }
        .tech-lot-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            background: var(--surface-50);
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        .tech-lot-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 12px; font-weight: 500; color: var(--text-muted); }
        .tech-lot-counts { display: inline-flex; align-items: center; gap: 12px; }
        .tech-item-block {
            margin-left: 8px;
            margin-bottom: 14px;
            padding: 10px 12px;
            border: 1px solid var(--surface-200);
            border-radius: var(--radius-md);
            background: var(--surface-0);
        }
        .tech-item-head {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .tech-item-desc { font-weight: 600; color: var(--text-primary); }
        .tech-item-qty { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .fin-lot-bar .fin-price { font-weight: 700; color: var(--text-primary); }
        .fin-detail-table thead th { background: var(--primary-50); color: var(--primary-600); font-size: 11px; }
        .fin-detail-table .num-cell { text-align: right; font-variant-numeric: tabular-nums; }
        .fin-final-price { font-weight: 700; }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="page-header-inner">
            <a href="tender-dashboard-complete.html" class="back-link"><i class="pi pi-arrow-left" aria-hidden="true"></i> Back to Evaluation dashboard</a>
        </div>
    </header>

    <div class="wrap">
        <div class="supplier-banner" id="supplier-banner">
            <h1><i class="pi pi-building" aria-hidden="true"></i> <span id="supplier-title">Supplier</span></h1>
            <div class="supplier-meta" id="supplier-meta"></div>
        </div>

        <div class="main-tabs" role="tablist" aria-label="Supplier detail sections">
            <button type="button" class="main-tab" role="tab" id="tab-main-submission" aria-selected="true" aria-controls="panel-submission" data-main="submission">
                <i class="pi pi-inbox" aria-hidden="true"></i> Submission
            </button>
            <button type="button" class="main-tab" role="tab" id="tab-main-evaluation" aria-selected="false" aria-controls="panel-evaluation" data-main="evaluation">
                <i class="pi pi-chart-line" aria-hidden="true"></i> Evaluation
            </button>
            <button type="button" class="main-tab" role="tab" id="tab-main-bidding-history" aria-selected="false" aria-controls="panel-bidding-history" data-main="bidding-history">
                <i class="pi pi-history" aria-hidden="true"></i> Bidding history
            </button>
            <button type="button" class="main-tab" role="tab" id="tab-main-clarifications" aria-selected="false" aria-controls="panel-clarifications" data-main="clarifications">
                <i class="pi pi-comments" aria-hidden="true"></i> Evaluation clarifications
            </button>
        </div>

        <div id="panel-submission" class="panel active" role="tabpanel" aria-labelledby="tab-main-submission">
            <div class="sub-tabs-wrap">
                <div class="sub-tabs" role="tablist" aria-label="Submission forms">
                    <button type="button" class="sub-tab" role="tab" data-sub="bidder" aria-selected="true"><i class="pi pi-id-card" aria-hidden="true"></i> Bidder's Information</button>
                    <button type="button" class="sub-tab" role="tab" data-sub="technical" aria-selected="false"><i class="pi pi-wrench" aria-hidden="true"></i> Technical Bid</button>
                    <button type="button" class="sub-tab" role="tab" data-sub="financial" aria-selected="false"><i class="pi pi-dollar" aria-hidden="true"></i> Financial Bid</button>
                    <button type="button" class="sub-tab" role="tab" data-sub="qual" aria-selected="false"><i class="pi pi-list-check" aria-hidden="true"></i> Qualification &amp; Eligibility</button>
                    <button type="button" class="sub-tab" role="tab" data-sub="other" aria-selected="false"><i class="pi pi-folder-open" aria-hidden="true"></i> Other Forms</button>
                    <button type="button" class="sub-tab" role="tab" data-sub="compliance" aria-selected="false"><i class="pi pi-shield" aria-hidden="true"></i> Compliance &amp; Declarations</button>
                </div>
                <div id="sub-panels"></div>
            </div>
        </div>

        <div id="panel-evaluation" class="panel" role="tabpanel" aria-labelledby="tab-main-evaluation" hidden>
            <div class="sub-tabs-wrap" style="border:none;background:transparent;">
                <div class="eval-summary">
                    <p class="eval-section-lead">Evaluation Summary</p>
                    <div id="evaluation-table-host"></div>
                </div>
                <div class="eval-stage-section">
                    <h2 class="eval-section-lead">Stage Detail</h2>
                    <div class="eval-stage-tabs" id="eval-stage-tabs" role="tablist" aria-label="Evaluation stage detail"></div>
                    <div id="eval-stage-panels-host"></div>
                </div>
            </div>
        </div>

        <div id="panel-bidding-history" class="panel" role="tabpanel" aria-labelledby="tab-main-bidding-history" hidden>
            <div class="sub-tabs-wrap" style="border:none;background:transparent;">
                <div id="bidding-history-host"></div>
            </div>
        </div>

        <div id="panel-clarifications" class="panel" role="tabpanel" aria-labelledby="tab-main-clarifications" hidden>
            <div class="sub-tabs-wrap" style="border:none;background:transparent;">
                <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">Clarification threads linked to evaluation stages and lots.</p>
                <div id="clarifications-host"></div>
            </div>
        </div>

    </div>

    <script>
        (function () {
            const VENDORS = {
                vendor1: { code: 'S1', name: 'MedSupply Ltd.', ungm: '309663', country: 'Germany' },
                vendor2: { code: 'S2', name: 'HealthCare Corp.', ungm: '301245', country: 'USA' },
                vendor3: { code: 'S3', name: 'MedTech Inc.', ungm: '315789', country: 'Japan' }
            };

            const EVAL_CELLS = {
                lot1: {
                    vendor1: { step1: { status: 'pass' }, step2: { status: 'pass' }, step3: { status: 'pass' }, step4: { status: 'pass' } },
                    vendor2: { step1: { status: 'in_progress', progress: 55 }, step2: { status: 'in_progress', progress: 55 }, step3: { status: 'in_progress', progress: 55 }, step4: { status: 'in_progress', progress: 55 } },
                    vendor3: { step1: { status: 'clarification' }, step2: { status: 'clarification' }, step3: { status: 'clarification' }, step4: { status: 'clarification' } }
                },
                lot2: {
                    vendor1: { step1: { status: 'in_progress', progress: 40 }, step2: { status: 'in_progress', progress: 40 }, step3: { status: 'in_progress', progress: 70 }, step4: { status: 'in_progress', progress: 30 } },
                    vendor2: { step1: { status: 'pass' }, step2: { status: 'pass' }, step3: { status: 'pass' }, step4: { status: 'pass' } },
                    vendor3: { step1: { status: 'not_started' }, step2: { status: 'not_started' }, step3: { status: 'not_started' }, step4: { status: 'not_started' } }
                }
            };

            const STAGES = [
                { key: 'step1', title: '1. Eligibility' },
                { key: 'step2', title: '2. Qualification' },
                { key: 'step3', title: '3. Technical' },
                { key: 'step4', title: '4. Financial' }
            ];

            const LOTS = [
                { key: 'lot1', label: 'Lot 1 — Personal Protective Equipment' },
                { key: 'lot2', label: 'Lot 2 — Medical Consumables' }
            ];

            const params = new URLSearchParams(window.location.search);
            const vendorId = VENDORS[params.get('vendor')] ? params.get('vendor') : 'vendor1';
            const v = VENDORS[vendorId];

            document.getElementById('supplier-title').textContent = v.name;
            document.getElementById('supplier-meta').innerHTML = `
                <span><i class="pi pi-globe" aria-hidden="true"></i> UNGM: ${v.ungm}</span>
                <span><i class="pi pi-map-marker" aria-hidden="true"></i> ${v.country}</span>
            `;
            document.title = v.name + ' — submission & evaluation (mock)';

            const submissionCopy = {
                bidder: `
                    <div class="mock-block mock-dl">
                        <h3>Submitted responses (mock)</h3>
                        <div><dt>Legal name &amp; registration</dt><dd>Matches ${v.name}; commercial register excerpt uploaded (ref: BIF-2024-089).</dd></div>
                        <div><dt>Contact &amp; authorised signatory</dt><dd>Primary: procurement@${vendorId}.example.org — signatory: A. Müller (CEO).</dd></div>
                        <div><dt>JV / consortium</dt><dd>None declared.</dd></div>
                    </div>`,
                technical: `
                    <div class="mock-block mock-dl">
                        <h3>Technical bid excerpts (mock)</h3>
                        <div><dt>Product conformance</dt><dd>Declared compliance with tender technical schedule; test reports referenced (EN455, EN14683 where applicable).</dd></div>
                        <div><dt>Delivery &amp; packaging</dt><dd>Proposed lead time 45–60 days lot-dependent; cold-chain statement attached for Lot 2.</dd></div>
                    </div>`,
                financial: `
                    <div class="mock-block mock-dl">
                        <h3>Financial bid (mock)</h3>
                        <div><dt>Price schedule</dt><dd>Submitted via Form B; totals reconciled with line items; validity 90 days.</dd></div>
                        <div><dt>Bid security</dt><dd>Instrument ref: BS-${v.ungm}-2024 (demo).</dd></div>
                    </div>`,
                qual: `
                    <div class="mock-block mock-dl">
                        <h3>Qualification &amp; eligibility (mock)</h3>
                        <div><dt>Experience &amp; forms D/E</dt><dd>Performance statement on file; manufacturer authorisations for distributor lines attached.</dd></div>
                        <div><dt>Policies</dt><dd>Gender mainstreaming statement and registration certificates uploaded.</dd></div>

            document.getElementById('clarifications-host').innerHTML = buildClarificationsHtml();

            document.querySelectorAll('.main-tab').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var main = btn.getAttribute('data-main');
                    document.querySelectorAll('.main-tab').forEach(function (b) { b.setAttribute('aria-selected', b === btn ? 'true' : 'false'); });
                    MAIN_PANEL_KEYS.forEach(function (key) {
                        var panel = document.getElementById('panel-' + key);
                        if (!panel) {
                            return;
                        }
                        var show = main === key;
                        panel.classList.toggle('active', show);
                        panel.toggleAttribute('hidden', !show);
                    });
                });
            });

            document.querySelectorAll('.sub-tab').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var sub = btn.getAttribute('data-sub');
                    document.querySelectorAll('.sub-tab').forEach(function (b) { b.setAttribute('aria-selected', b === btn ? 'true' : 'false'); });
                    document.querySelectorAll('.sub-panel').forEach(function (p) {
                        p.classList.toggle('active', p.id === 'sub-panel-' + sub);
                    });
                });
            });
        })();
    </script>
</body>
</html>
